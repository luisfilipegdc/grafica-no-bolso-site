server {
  listen 80;
  listen [::]:80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;
  gzip_min_length 256;

  # Cache estático longo pra assets imutáveis (versionados via ?v=)
  location ~* \.(?:css|js|woff2?|ttf|otf|svg|ico|png|jpg|jpeg|webp|gif)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, must-revalidate";
    try_files $uri =404;
  }

  # Redirect 301: /xxx.html -> /xxx (canonical, evita duplicate content no Google)
  location ~ ^/(.+)\.html$ {
    return 301 /$1;
  }

  # sitemap.xml e robots.txt direto
  location = /sitemap.xml { try_files /sitemap.xml =404; expires 1d; }
  location = /robots.txt  { try_files /robots.txt =404;  expires 1d; }

  # Clean URLs: /grafica -> /grafica.html (transparente, sem redirect)
  location / {
    try_files $uri $uri.html $uri/ /index.html;
  }

  # Páginas de erro
  error_page 500 502 503 504 /50x.html;
  location = /50x.html { internal; }
}
